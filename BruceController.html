<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bruce Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{background:#111;color:#0f0;font-family:'Courier New',monospace;padding:8px;max-width:480px;margin:0 auto;min-height:100vh}
h1{text-align:center;font-size:0.8em;margin:3px 0;letter-spacing:2px;color:#0f0}
#st{text-align:center;font-size:0.45em;color:#070;margin-bottom:4px}

#tela{
  background:#001800;border:2px solid #0f0;border-radius:4px;padding:10px 8px;
  min-height:170px;max-height:250px;overflow-y:auto;font-size:0.68em;line-height:1.5;
  white-space:pre-wrap;font-family:'Courier New',monospace;color:#0f0;margin-bottom:5px;
  scrollbar-width:thin;scrollbar-color:#0f0 #001800
}
#tela::-webkit-scrollbar{width:3px}
#tela::-webkit-scrollbar-track{background:#001800}
#tela::-webkit-scrollbar-thumb{background:#0f0;border-radius:2px}
.sel{background:#0f0;color:#000;font-weight:bold;display:block}
.tit{color:#0f0;font-weight:bold;font-size:1.05em}
.sep{color:#030;display:block}

.dpad{display:flex;flex-direction:column;align-items:center;gap:2px;margin:3px 0}
.dr{display:flex;gap:4px;justify-content:center;align-items:center}
.dbtn{
  width:50px;height:50px;border-radius:50%;border:2px solid #0f0;
  background:#050;color:#0f0;font-size:1.1em;display:flex;align-items:center;
  justify-content:center;cursor:pointer;touch-action:manipulation
}
.dbtn:active{background:#0f0;color:#000;transform:scale(0.92)}
.dbtn.s{width:40px;height:40px;font-size:0.85em}
.dlbl{font-size:0.4em;color:#060;text-align:center;margin-top:1px}

.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:3px 0}
.q{
  background:#050;border:1px solid #090;color:#0f0;padding:5px 2px;border-radius:3px;
  cursor:pointer;font-size:0.5em;text-align:center;touch-action:manipulation
}
.q:active{background:#0f0;color:#000}

#login{max-width:230px;margin:50px auto;text-align:center}
#login input{width:100%;margin:3px 0;background:#050;border:1px solid #090;color:#0f0;padding:6px;border-radius:3px;font-size:0.65em;font-family:'Courier New',monospace}
#login .lb{width:100%;padding:7px;margin-top:4px;background:#050;border:1px solid #0f0;color:#0f0;border-radius:3px;cursor:pointer;font-size:0.7em}
#login .lb:active{background:#0f0;color:#000}
.hide{display:none!important}
</style>
</head>
<body>

<div id="login">
  <h1>BRUCE PANEL</h1>
  <input type="text" id="lu" value="admin">
  <input type="password" id="lp" value="bruce">
  <input type="text" id="li" value="192.168.3.113">
  <div class="lb" onclick="entrar()">CONECTAR</div>
  <div style="font-size:0.45em;color:#060;margin-top:8px">Conectado na KEYROZ: use IP 192.168.3.113<br>Conectado no BruceNet: use IP 172.0.0.1</div>
</div>

<div id="main" class="hide">
  <h1>BRUCE</h1>
  <div id="st">Conectado | Navegue pelos menus</div>
  
  <div id="tela">Pressione OK para comecar</div>
  
  <div class="dpad">
    <div class="dr">
      <div style="width:50px"></div>
      <div><div class="dbtn" onclick="nv('up')">&#9650;</div><div class="dlbl">CIMA</div></div>
      <div style="width:50px"></div>
    </div>
    <div class="dr">
      <div><div class="dbtn s" onclick="nv('esc')">&#9664;</div><div class="dlbl">VOLT</div></div>
      <div><div class="dbtn" onclick="nv('select')">OK</div><div class="dlbl">SEL</div></div>
      <div><div class="dbtn s" onclick="nv('next')">&#9654;</div><div class="dlbl">PROX</div></div>
    </div>
    <div class="dr">
      <div style="width:50px"></div>
      <div><div class="dbtn" onclick="nv('down')">&#9660;</div><div class="dlbl">BAIXO</div></div>
      <div style="width:50px"></div>
    </div>
    <div class="dr" style="margin-top:1px">
      <div><div class="dbtn s" onclick="nv('nextpage')">&#9654;&#9654;</div><div class="dlbl">PROX PAG</div></div>
      <div><div class="dbtn s" onclick="nv('prevpage')">&#9664;&#9664;</div><div class="dlbl">PAG ANT</div></div>
    </div>
  </div>

  <div class="quick">
    <div class="q" onclick="ir(0,0)">WiFi<br><span style="color:#080">Acessar</span></div>
    <div class="q" onclick="ir(1,5)">BLE Spam<br><span style="color:#080">ALL</span></div>
    <div class="q" onclick="ir(8,0)">RFID<br><span style="color:#080">Ler</span></div>
    <div class="q" onclick="window.open(b+'/','_blank')">WebUI<br><span style="color:#080">Arquivos</span></div>
  </div>
</div>

<script>
var b=''

function id(n){return document.getElementById(n)}

async function api(m,p,body){
  try{
    var r=await fetch(b+m,{method:p,credentials:'include',body})
    return{ok:r.ok,txt:await r.text()}
  }catch(e){return{ok:false,txt:''}}
}

async function entrar(){
  b='http://'+id('li').value
  var r=await api('/login','POST','username='+id('lu').value+'&password='+id('lp').value)
  if(r.ok){
    id('login').classList.add('hide')
    id('main').classList.remove('hide')
    atualizar()
  }
}

async function atualizar(){
  var r=await api('/menu','GET')
  if(r.ok&&r.txt){
    var txt=r.txt,h=''
    var linhas=txt.split('\n'),titulo='',items=[]
    for(var l of linhas){
      l=l.trim()
      if(l.startsWith('Actual Menu:')){titulo=l.split(':')[1].trim();continue}
      if(l.match(/^[>\s]*\d+\s*-/)) items.push(l)
    }
    if(titulo) h+='<span class="tit">'+titulo+'</span>\n<span class="sep">'+'-'.repeat(Math.min(titulo.length,25))+'</span>\n'
    for(var m of items){
      if(m.startsWith('>')) h+='<span class="sel">'+(m.replace(/^>\s*/,''))+'</span>'
      else h+='  '+m+'\n'
    }
    id('tela').innerHTML=h||'[aguardando...]'
  }
}

async function nv(dir){
  await api('/cm','POST','cmnd=nav '+dir)
  await atualizar()
}

async function ir(main,sub){
  for(var i=0;i<6;i++) await api('/cm','POST','cmnd=nav esc')
  for(var i=0;i<main;i++) await api('/cm','POST','cmnd=nav down')
  await api('/cm','POST','cmnd=nav select')
  for(var i=0;i<sub;i++) await api('/cm','POST','cmnd=nav down')
  await api('/cm','POST','cmnd=nav select')
  await atualizar()
}
</script>
</body>
</html>
